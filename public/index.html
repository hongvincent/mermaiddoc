<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MermaidDoc — Markdown + Mermaid Viewer</title>
  <meta name="description" content="Upload Markdown files and visualize Mermaid diagrams with print support." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/index.css" />
  <link rel="stylesheet" href="/css/markdown.css" />
  <link rel="stylesheet" href="/css/mermaid-formal.css" />
  <link rel="stylesheet" href="/css/print.css" media="print" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
</head>
<body>
  <header class="header" id="app-header">
    <div class="header__left">
      <div class="header__logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="24" height="24" rx="6" stroke="currentColor" stroke-width="2"/><path d="M8 10L14 7L20 10V18L14 21L8 18Z" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="14" cy="14" r="2" fill="currentColor"/></svg>
      </div>
      <h1 class="header__title">MermaidDoc</h1>
    </div>
    <div class="header__right">
      <button class="btn btn--icon" id="btn-theme" title="Toggle dark mode"><svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      <button class="btn btn--secondary" id="btn-print" title="Print document" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg><span>Print</span></button>
    </div>
  </header>

  <main class="main" id="app-main">
    <section class="upload-zone" id="upload-zone">
      <div class="upload-zone__inner">
        <div class="upload-zone__icon"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <h2 class="upload-zone__title">Drop files or folders here</h2>
        <p class="upload-zone__subtitle">supports <code>.md</code> <code>.markdown</code> <code>.txt</code> — folders are scanned recursively</p>
        <input type="file" id="file-input" accept=".md,.markdown,.txt" multiple hidden />
        <button class="btn btn--primary" id="btn-browse"><span>Browse Files</span></button>
      </div>
    </section>

    <!-- File Queue Sidebar -->
    <aside class="sidebar" id="file-sidebar">
      <div class="sidebar__header">
        <span class="sidebar__title">Files</span>
        <span class="sidebar__counter" id="queue-counter">0 files</span>
      </div>
      <ul class="queue-list" id="queue-list"></ul>
      <div class="sidebar__footer">
        <button class="btn btn--ghost btn--sm" id="btn-add-more" title="Add more files">+ Add files</button>
        <button class="btn btn--ghost btn--sm" id="btn-clear-queue" title="Clear all">Clear all</button>
      </div>
    </aside>

    <section class="viewer" id="viewer" hidden>
      <div class="viewer__toolbar" id="viewer-toolbar">
        <div class="viewer__file-info">
          <button class="btn btn--icon btn--sm" id="btn-prev-file" title="Previous file" disabled>‹</button>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="viewer__filename" id="viewer-filename">document.md</span>
          <button class="btn btn--icon btn--sm" id="btn-next-file" title="Next file" disabled>›</button>
        </div>
        <div class="viewer__actions">
          <button class="btn btn--ghost btn--sm" id="btn-new-file" title="Open another file"><span>+ New file</span></button>
        </div>
      </div>
      <article class="viewer__content markdown-body" id="viewer-content"></article>
    </section>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="/js/renderer.js"></script>
  <script src="/js/uploader.js"></script>
  <script src="/js/printer.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
